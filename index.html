<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ManiPro - Gestão de Salão</title>
<meta name="theme-color" content="#1a1025">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#1a1025;--dk2:#241535;--dk3:#2e1d42;--dk4:#3d2856;--lilac:#9B59B6;--lilac2:#8E44AD;--lilacLight:#D2B4DE;--txm:#c9b8d9;--txl:#a08bb5;--green:#27AE60;--red:#E74C3C;--blue:#3498DB}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:#fff;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
a{color:var(--lilac);text-decoration:none}
.btn{background:var(--lilac);color:#fff;border:none;border-radius:12px;padding:14px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;touch-action:manipulation}
.btn:hover{background:var(--lilac2);transform:scale(1.02)}
.btn-out{background:transparent;border:1.5px solid var(--lilac);color:var(--lilac)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:8px 16px;font-size:12px;border-radius:8px;width:auto}
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;color:var(--txl);margin-bottom:6px;font-weight:600}
.fi{width:100%;background:var(--dk3);border:1.5px solid var(--dk4);border-radius:10px;padding:12px 14px;color:#fff;font-size:14px;outline:none;transition:border .2s}
.fi:focus{border-color:var(--lilac)}
select.fi{appearance:none}
.container{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.page{display:none;padding-bottom:80px}.page.active{display:block}
.header{padding:20px 20px 10px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:800;color:var(--lilac)}
.card{background:var(--dk2);border-radius:14px;padding:16px;margin:0 20px 12px}
.ci{background:var(--dk2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.ci .cit{font-weight:600;font-size:14px}.ci .cits{font-size:12px;color:var(--txl)}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--dk2);border-top:1px solid var(--dk4);display:flex;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:100}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;cursor:pointer;opacity:.5;transition:all .2s;border:none;background:none;color:#fff;font-size:10px;font-weight:600}
.ni.active{opacity:1;color:var(--lilac)}.ni svg{width:22px;height:22px}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mov.open{opacity:1;pointer-events:all}
.msh{background:var(--dk2);border-radius:20px 20px 0 0;padding:24px 20px env(safe-area-inset-bottom,24px);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mhd{width:40px;height:4px;background:var(--dk4);border-radius:4px;margin:0 auto 16px;cursor:pointer}
.mt{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--lilac)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;margin-bottom:16px}
.stat{background:var(--dk2);border-radius:12px;padding:14px;text-align:center}
.stat .sv{font-size:22px;font-weight:800;color:var(--lilac)}.stat .sl{font-size:11px;color:var(--txl);margin-top:2px}
.tog{position:relative;width:44px;height:24px;background:var(--dk4);border-radius:12px;cursor:pointer;transition:background .2s}
.tog.on{background:var(--lilac)}
.tog::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s}
.tog.on::after{transform:translateX(20px)}
.spin{width:30px;height:30px;border:3px solid var(--dk4);border-top-color:var(--lilac);border-radius:50%;animation:sp .6s linear infinite;margin:20px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.fbtn{background:var(--dk3);border:1px solid var(--dk4);color:var(--txm);border-radius:50px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s}
.fbtn.active,.fbtn:hover{background:var(--lilac);color:#fff;border-color:var(--lilac)}
.ag-item{background:var(--dk2);border-radius:12px;padding:14px;margin:0 20px 10px;cursor:pointer}
.ag-time{font-size:13px;font-weight:700;color:var(--lilac)}.ag-name{font-size:14px;font-weight:600;margin-top:4px}
.ag-svc{font-size:12px;color:var(--txl)}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700}
.badge-pending{background:rgba(243,156,18,.15);color:#F39C12}
.badge-confirmed{background:rgba(52,152,219,.15);color:#3498DB}
.badge-done{background:rgba(39,174,96,.15);color:#27AE60}
.badge-cancelled{background:rgba(231,76,60,.15);color:#E74C3C}
</style>
</head>
<body>
<div class="container" id="app-container">
<div id="login-page" class="page active">
<div style="padding:60px 30px;text-align:center">
<div style="font-size:48px;margin-bottom:10px">💅</div>
<h1 style="font-size:28px;color:var(--lilac);font-weight:800;margin-bottom:4px">ManiPro</h1>
<p style="color:var(--txl);font-size:13px;margin-bottom:40px">Gestão inteligente para seu salão</p>
<div class="fg"><label class="fl">E-mail</label><input class="fi" id="login-email" type="email" placeholder="seu@email.com"></div>
<div class="fg"><label class="fl">Senha</label><input class="fi" id="login-pwd" type="password" placeholder="Sua senha"></div>
<button class="btn" onclick="doLogin()" style="margin-top:10px">Entrar</button>
<p id="login-err" style="color:var(--red);font-size:12px;margin-top:12px;display:none"></p>
<p style="margin-top:24px;font-size:12px;color:var(--txl)">Não tem conta? <a href="javascript:void(0)" onclick="showPage('register-page')">Criar salão</a></p>
</div></div>
<div id="register-page" class="page">
<div style="padding:40px 30px;text-align:center">
<div style="font-size:36px;margin-bottom:10px">✨</div>
<h2 style="color:var(--lilac);margin-bottom:20px">Criar Salão</h2>
<div class="fg"><label class="fl">Nome do Salão</label><input class="fi" id="reg-shop" placeholder="Ex: Beauty Nails"></div>
<div class="fg"><label class="fl">Seu nome</label><input class="fi" id="reg-name" placeholder="Seu nome completo"></div>
<div class="fg"><label class="fl">E-mail</label><input class="fi" id="reg-email" type="email" placeholder="seu@email.com"></div>
<div class="fg"><label class="fl">Senha</label><input class="fi" id="reg-pwd" type="password" placeholder="Min 6 caracteres"></div>
<button class="btn" onclick="doRegister()" style="margin-top:10px">Criar conta</button>
<p id="reg-err" style="color:var(--red);font-size:12px;margin-top:12px;display:none"></p>
<p style="margin-top:20px;font-size:12px;color:var(--txl)">Já tem conta? <a href="javascript:void(0)" onclick="showPage('login-page')">Entrar</a></p>
</div></div>
<div id="admin-app" style="display:none">
<div id="pg-dash" class="page active">
<div class="header"><div><h1>💅 ManiPro</h1><div class="subtitle" id="td-lbl">Hoje</div></div><button class="btn-sm btn-out" onclick="doLogout()">Sair</button></div>
<div class="stats"><div class="stat"><div class="sv" id="st-today">0</div><div class="sl">Hoje</div></div><div class="stat"><div class="sv" id="st-rtd">R$0</div><div class="sl">Receita hoje</div></div><div class="stat"><div class="sv" id="st-month">0</div><div class="sl">Este mês</div></div><div class="stat"><div class="sv" id="st-rm">R$0</div><div class="sl">Receita mês</div></div></div>
<div id="dash-list"></div>
</div>
<div id="pg-agenda" class="page">
<div class="header"><h1>Agenda</h1><button class="btn-sm" onclick="openNewAppt()">+ Novo</button></div>
<div style="padding:0 20px 10px;display:flex;align-items:center;gap:10px"><input type="date" class="fi" id="ag-date" onchange="loadAgenda()" style="flex:1"><button class="btn-sm btn-out" onclick="agToday()">Hoje</button></div>
<div id="agenda-list"></div>
</div>
<div id="pg-svcs" class="page">
<div class="header"><h1>Serviços</h1><button class="btn-sm" onclick="openAddService()">+ Novo</button></div>
<div id="svc-list" style="padding:0 20px"></div>
</div>
<div id="pg-barbs" class="page">
<div class="header"><h1>Profissionais</h1><button class="btn-sm" onclick="addBarber()">+ Nova</button></div>
<div id="barb-cfg" style="padding:0 20px"></div>
</div>
<div id="pg-packs" class="page">
<div class="header"><h1>Pacotes</h1><button class="btn-sm" onclick="openAddPackage()">+ Novo</button></div>
<div id="pack-list" style="padding:0 20px"></div>
</div>
<div id="pg-promos" class="page">
<div class="header"><h1>Promoções</h1><button class="btn-sm" onclick="openAddPromo()">+ Nova</button></div>
<div id="promo-list" style="padding:0 20px"></div>
</div>
<div id="pg-cfg" class="page">
<div class="header"><h1>Configurações</h1></div>
<div id="cfg-content" style="padding:0 20px"></div>
</div>
<nav class="nav">
<button class="ni active" onclick="navTo('dash')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>Início</button>
<button class="ni" onclick="navTo('agenda')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>Agenda</button>
<button class="ni" onclick="navTo('svcs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Serviços</button>
<button class="ni" onclick="navTo('barbs')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Equipe</button>
<button class="ni" onclick="navTo('cfg')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.68 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68 1.65 1.65 0 0010.08 3V3a2 2 0 014 0v.09a1.65 1.65 0 001.08 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1.08H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1.08z"/></svg>Config</button>
</nav>
</div>
</div>
<script>
// === CONFIG ===
const SUPABASE_URL="https://zheqdrblwlhvzxrdaifo.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpoZXFkcmJsd2xodnp4cmRhaWZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTI0MTgsImV4cCI6MjA5NzE2ODQxOH0.5giracRbhgsf2CWa_Zd-ZpQWO2z_6H_bHXdpYRrXVHs";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const S={shopId:null,role:"owner",barberUserId:null};

// === UTILS ===
function fmt(v){return "R$"+Number(v||0).toFixed(2).replace(".",",")}
function showPage(id){document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active")});var el=document.getElementById(id);if(el)el.classList.add("active")}
function openMod(id){var m=document.getElementById(id);if(m)m.classList.add("open")}
function closeMod(id){var m=document.getElementById(id);if(m)m.classList.remove("open")}
function toast(msg){var t=document.createElement("div");t.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--lilac);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:999";t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}

// === NAVIGATION ===
function navTo(pg){
  document.querySelectorAll("#admin-app .page").forEach(function(p){p.classList.remove("active")});
  var el=document.getElementById("pg-"+pg);if(el)el.classList.add("active");
  document.querySelectorAll(".ni").forEach(function(n){n.classList.remove("active")});
  if(event&&event.currentTarget)event.currentTarget.classList.add("active");
  if(pg==="dash")loadDash();
  else if(pg==="agenda")loadAgenda();
  else if(pg==="svcs")loadServices();
  else if(pg==="barbs")loadBarbers();
  else if(pg==="packs")loadPackages();
  else if(pg==="promos")loadPromos();
  else if(pg==="cfg")loadConfig();
}

function enterApp(){
  document.getElementById("login-page").classList.remove("active");
  document.getElementById("register-page").classList.remove("active");
  document.getElementById("admin-app").style.display="block";
  loadDash();
}

// === AUTH ===
async function doLogin(){
  var email=document.getElementById("login-email").value.trim();
  var pwd=document.getElementById("login-pwd").value;
  var errEl=document.getElementById("login-err");
  errEl.style.display="none";
  if(!email||!pwd){errEl.textContent="Preencha todos os campos";errEl.style.display="block";return}
  var r=await db.auth.signInWithPassword({email:email,password:pwd});
  if(r.error){errEl.textContent=r.error.message;errEl.style.display="block";return}
  await loadShop(r.data.user.id);
}

async function doRegister(){
  var shop=document.getElementById("reg-shop").value.trim();
  var name=document.getElementById("reg-name").value.trim();
  var email=document.getElementById("reg-email").value.trim();
  var pwd=document.getElementById("reg-pwd").value;
  var errEl=document.getElementById("reg-err");
  errEl.style.display="none";
  if(!shop||!email||!pwd){errEl.textContent="Preencha os campos obrigat\u00f3rios";errEl.style.display="block";return}
  if(pwd.length<6){errEl.textContent="Senha min 6 caracteres";errEl.style.display="block";return}
  var r=await db.auth.signUp({email:email,password:pwd,options:{data:{full_name:name}}});
  if(r.error){errEl.textContent=r.error.message;errEl.style.display="block";return}
  var uid=r.data.user.id;
  var slug=shop.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
  var sr=await db.from("shops").insert({owner_id:uid,name:shop,slug:slug}).select().single();
  if(sr.error){errEl.textContent="Erro: "+sr.error.message;errEl.style.display="block";return}
  S.shopId=sr.data.id;enterApp();toast("Sal\u00e3o criado!");
}

async function loadShop(uid){
  var r=await db.from("shops").select("*").eq("owner_id",uid).maybeSingle();
  if(r.data){S.shopId=r.data.id;S.role="owner";enterApp();return}
  var br=await db.from("barber_users").select("barber_id,shop_id").eq("user_id",uid).maybeSingle();
  if(br&&br.data){S.shopId=br.data.shop_id;S.barberUserId=br.data.barber_id;S.role="barber";enterApp();return}
  document.getElementById("login-err").textContent="Nenhum sal\u00e3o encontrado";document.getElementById("login-err").style.display="block";
}

async function doLogout(){await db.auth.signOut();location.reload()}

(async function(){var s=await db.auth.getSession();if(s.data.session)await loadShop(s.data.session.user.id)})();

// === DASHBOARD ===
async function loadDash(){
  var td=new Date().toISOString().split("T")[0];
  document.getElementById("td-lbl").textContent="Hoje "+new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
  try{
    var r1=await db.from("appointments").select("*").eq("appointment_date",td).eq("shop_id",S.shopId).neq("status","cancelled").order("appointment_time");
    var ta=r1.data||[];
    var ms=td.slice(0,7)+"-01";
    var r2=await db.from("appointments").select("service_price,status").gte("appointment_date",ms).eq("shop_id",S.shopId).neq("status","cancelled");
    var ma=r2.data||[];
    document.getElementById("st-today").textContent=ta.length;
    var rtd=ta.filter(function(a){return a.status==="done"||a.status==="finished"}).reduce(function(s,a){return s+Number(a.service_price||0)},0);
    document.getElementById("st-rtd").textContent=fmt(rtd);
    document.getElementById("st-month").textContent=ma.length;
    var rm=ma.filter(function(a){return a.status==="done"||a.status==="finished"}).reduce(function(s,a){return s+Number(a.service_price||0)},0);
    document.getElementById("st-rm").textContent=fmt(rm);
    var dl=document.getElementById("dash-list");
    if(ta.length>0){dl.innerHTML=ta.map(function(a){return agItemHTML(a)}).join("")}
    else{dl.innerHTML='<div style="text-align:center;padding:30px;color:var(--txl)">Nenhum agendamento hoje</div>'}
  }catch(e){console.error(e)}
}

function agItemHTML(a){
  var st=a.status||"pending";
  var badges={pending:"Pendente",confirmed:"Confirmado",done:"Conclu\u00eddo",finished:"Encerrado",cancelled:"Cancelado"};
  var cls={pending:"badge-pending",confirmed:"badge-confirmed",done:"badge-done",finished:"badge-done",cancelled:"badge-cancelled"};
  return '<div class="ag-item" onclick="openApptDetail('+Q+a.id+Q+')"><div style="display:flex;justify-content:space-between;align-items:center"><div class="ag-time">'+(a.appointment_time||"--:--").slice(0,5)+'</div><span class="badge '+(cls[st]||"badge-pending")+'">'+(badges[st]||st)+'</span></div><div class="ag-name">'+(a.client_name||"Cliente")+'</div><div class="ag-svc">'+(a.service_name||"Servi\u00e7o")+" \u2022 "+(a.barber_name||"Profissional")+" \u2022 "+fmt(a.service_price)+'</div></div>';
}

// === AGENDA ===
function agToday(){document.getElementById("ag-date").value=new Date().toISOString().split("T")[0];loadAgenda()}
async function loadAgenda(){
  var dt=document.getElementById("ag-date").value;
  if(!dt){dt=new Date().toISOString().split("T")[0];document.getElementById("ag-date").value=dt}
  var r=await db.from("appointments").select("*").eq("appointment_date",dt).eq("shop_id",S.shopId).order("appointment_time");
  var list=r.data||[];
  var el=document.getElementById("agenda-list");
  if(list.length>0){el.innerHTML=list.map(function(a){return agItemHTML(a)}).join("")}
  else{el.innerHTML='<div style="text-align:center;padding:40px;color:var(--txl)">Nenhum agendamento nesta data</div>'}
}

async function openNewAppt(){
  if(!document.getElementById("mod-appt"))await injectApptModal();
  document.getElementById("appt-edit-id").value="";
  document.getElementById("appt-client").value="";
  document.getElementById("appt-phone").value="";
  document.getElementById("appt-date").value=document.getElementById("ag-date").value||new Date().toISOString().split("T")[0];
  document.getElementById("appt-time").value="";
  document.getElementById("mod-appt-title").textContent="Novo Agendamento";
  openMod("mod-appt");
}

async function injectApptModal(){
  var svcs=await db.from("services").select("id,name,price,duration").eq("shop_id",S.shopId).eq("active",true).order("name");
  var barbs=await db.from("barbers").select("id,name").eq("shop_id",S.shopId).eq("active",true).order("name");
  var svcOpts=(svcs.data||[]).map(function(s){return '<option value="'+s.id+'" data-price="'+s.price+'" data-dur="'+s.duration+'">'+s.name+" - "+fmt(s.price)+'</option>'}).join("");
  var brbOpts=(barbs.data||[]).map(function(b){return '<option value="'+b.id+'">'+b.name+'</option>'}).join("");
  var d=document.createElement("div");d.className="mov";d.id="mod-appt";
  d.innerHTML='<div class="msh"><div class="mhd" onclick="closeMod('+Q+'mod-appt'+Q+')"></div><div class="mt" id="mod-appt-title">Novo Agendamento</div><div class="fg"><label class="fl">Cliente *</label><input class="fi" id="appt-client" placeholder="Nome da cliente"></div><div class="fg"><label class="fl">WhatsApp</label><input class="fi" id="appt-phone" placeholder="11999999999"></div><div class="fg"><label class="fl">Servi\u00e7o *</label><select class="fi" id="appt-svc"><option value="">Selecione</option>'+svcOpts+'</select></div><div class="fg"><label class="fl">Profissional *</label><select class="fi" id="appt-barber"><option value="">Selecione</option>'+brbOpts+'</select></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Data *</label><input type="date" class="fi" id="appt-date"></div><div class="fg"><label class="fl">Hor\u00e1rio *</label><input type="time" class="fi" id="appt-time"></div></div><input type="hidden" id="appt-edit-id"><button class="btn" onclick="saveAppt()">Salvar</button></div>';

  el.innerHTML='<div class="card"><div class="mt">Dados do Sal\u00e3o</div><div class="fg"><label class="fl">Nome</label><input class="fi" id="cfg-name" value="'+(shop.name||"")+'"></div><div class="fg"><label class="fl">WhatsApp</label><input class="fi" id="cfg-whats" value="'+(shop.whatsapp||"")+'"></div><div class="fg"><label class="fl">Instagram</label><input class="fi" id="cfg-insta" value="'+(shop.instagram||"")+'"></div><div class="fg"><label class="fl">Chave PIX</label><input class="fi" id="cfg-pix" value="'+(shop.pix_key||"")+'"></div><div class="fg"><label class="fl">Endere\u00e7o</label><input class="fi" id="cfg-addr" value="'+(shop.address||"")+'"></div></div><div class="card"><div class="mt">Hor\u00e1rios</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="fg"><label class="fl">Abertura</label><input type="time" class="fi" id="cfg-open" value="'+(shop.opening_time||"09:00")+'"></div><div class="fg"><label class="fl">Fechamento</label><input type="time" class="fi" id="cfg-close" value="'+(shop.closing_time||"19:00")+'"></div><div class="fg"><label class="fl">Almo\u00e7o in\u00edcio</label><input type="time" class="fi" id="cfg-lunch1" value="'+(shop.lunch_start||"")+'"></div><div class="fg"><label class="fl">Almo\u00e7o fim</label><input type="time" class="fi" id="cfg-lunch2" value="'+(shop.lunch_end||"")+'"></div></div><div class="fg"><label class="fl">Intervalo (min)</label><input type="number" class="fi" id="cfg-slot" value="'+(shop.slot_duration||30)+'"></div></div><button class="btn" onclick="saveConfig()" style="margin:0 20px;width:calc(100% - 40px)">Salvar</button>';
}

async function saveConfig(){
  var obj={name:document.getElementById("cfg-name").value.trim(),whatsapp:document.getElementById("cfg-whats").value.trim(),instagram:document.getElementById("cfg-insta").value.trim(),pix_key:document.getElementById("cfg-pix").value.trim(),address:document.getElementById("cfg-addr").value.trim(),opening_time:document.getElementById("cfg-open").value||"09:00",closing_time:document.getElementById("cfg-close").value||"19:00",lunch_start:document.getElementById("cfg-lunch1").value||null,lunch_end:document.getElementById("cfg-lunch2").value||null,slot_duration:parseInt(document.getElementById("cfg-slot").value)||30};
  var r=await db.from("shops").update(obj).eq("id",S.shopId);
  if(r.error)toast("Erro: "+r.error.message);else toast("Salvo!");
}

// === KEYBOARD ===
document.addEventListener("keydown",function(e){
  if(e.key==="Escape")document.querySelectorAll(".mov.open").forEach(function(m){m.classList.remove("open")});
  if(e.key==="Enter"&&document.getElementById("login-page").classList.contains("active"))doLogin();
});
</script>
